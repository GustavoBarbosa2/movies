<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineMujães - Movie Details</title>
  <link rel="stylesheet" href="../styles/movie_details.css" />
</head>

<body>
  <header>
    <h1>CineMujães - Movie Details</h1>
  </header>

  <div class="movie-detail-container">
    <div class="movie-poster">
      <img id="movie-poster" src="" alt="Poster do Filme" />
    </div>

    <div class="movie-info">
      <h2 id="movie-title">Título do Filme</h2>
      <p><strong>🎞️ Duration:</strong> <span id="movie-duration"></span></p>
      <p><strong>📅 Year:</strong> <span id="movie-year"></span></p>
      <p><strong>🎬 Director:</strong> <span id="movie-director"></span></p>
      <p><strong>🧩 Genre:</strong> <span id="movie-genres"></span></p>
      <p><strong>🎭 Actors:</strong> <span id="movie-actors"></span></p>
      <p><strong>⭐ IMDB Rating:</strong> <span id="movie-rating"></span></p>
      <p><strong>🗣️ Language:</strong> <span id="movie-language"></span></p>
      <p><strong>📖 Full Plot:</strong> <span id="movie-plot"></span></p>
    </div>

    <div id="comments-section">
      <h3>Comments</h3>
      <div id="comments-container"></div>
      <div class="comment-form">
        <textarea id="comment-input" placeholder="Add a comment..."></textarea>
        <button onclick="addComment()">Send Comment</button>
      </div>
    </div>

    <button class="back-button" onclick="window.history.back()">⬅ Back to Movies</button>
  </div>

  <script src="../scripts/movie_details.js"></script>
</body>

</html>
